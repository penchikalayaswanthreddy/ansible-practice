- name: Functions in ansible
  hosts: local
  connection: local
  become: yes
  tasks: 
  - name: check if a user roboshop exist or not
    ansible.builtin.command: 
      id roboshop
    ignore_errors: true
    register: command_output
  - name: print the command output
    ansible.builtin.debug:
      msg: " {{ command_output }}"

