- name: Functions in ansible
  hosts: local
  connection: local
  become: yes
  tasks: 
  - name: Read YAML file and store in variable
    ansible.builtin.set_fact:
       yaml_var: "{{ lookup('file', 'emp_data.yaml') | from_yaml }}"

  - name: Copy JSON content to a file
    ansible.builtin.copy:
      content: "{{ yaml_var | to_nice_json }}"
      dest: ./emp_dat.json
