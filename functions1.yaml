- name: Functions in ansible
  hosts: local
  connection: local
  become: yes
  vars: 
    fruits: 
    - Name: Apple
      state: Himachal pradesh
    - Name: Banana
      state: Andhra
    - Name: carrot
      village: korrakodu
    - sport: kabbadi
      city: Anantapur
  tasks: 
  - name : Printing the varaible
    ansible.builtin.debug: 
      msg: " {{ fruits }}"